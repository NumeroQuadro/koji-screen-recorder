name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (no warnings)
        shell: bash
        run: |
          set -euo pipefail
          swift build 2>&1 | tee build.log

          warnings="$(grep -c "warning" build.log || true)"
          if [[ "$warnings" -ne 0 ]]; then
            echo "::error::Build produced ${warnings} warning(s)"
            exit 1
          fi

      - name: Test
        run: swift test
